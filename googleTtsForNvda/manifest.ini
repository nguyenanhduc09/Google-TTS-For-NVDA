name = googleTtsForNvda
summary = "Google TTS For NVDA"
description = """Use Google's WASM text-to-speech voices locally through a supported Chromium browser runtime such as Google Chrome, Microsoft Edge, or Brave as an NVDA synthesizer."""
author = "Nguyen Anh Duc <ducna1803@gmail.com>, Dao Duc Trung <trung@ddt.one> and Pham Hung Vuong <hungvuong106206@gmail.com>"
url = https://github.com/nguyenanhduc09/Google-TTS-For-NVDA
version = 0.4
docFileName = readme.html
minimumNVDAVersion = 2024.1.0
lastTestedNVDAVersion = 2026.1.0
updateChannel = None
changelog = """Version 0.4:
- Added automatic language profiles configurable from Google TTS For NVDA settings, with per-language voice, variant, rate, pitch, volume, capital, and spelling settings.
- Improved compatibility with NVDA 2024.1 through 2026 and safer synthesizer switching.
- Improved multilingual long-text reading with broader Unicode punctuation and no-space script handling.
- Added Brave as a supported Chromium browser runtime and improved Chrome, Edge, and Brave fallback behavior.
- Clarified Edge WebView2 troubleshooting and documented custom Chrome, Edge, and Brave paths in the GitHub README.
- Added an assignable gesture for opening Google TTS For NVDA settings and improved the synth settings ring notice while automatic language profiles are enabled; voice parameters are managed from profiles in this mode for NVDA Speech Settings compatibility.
- Improved Voice and Variant selection, voice warm-up, Voice Manager safety, and speech cancellation."""
