summary = "Google TTS For NVDA"
description = """透過受支援的 Chromium 瀏覽器執行階段（例如 Google Chrome、Microsoft Edge 或 Brave），在本機使用 Google 的 WASM 文字轉語音（TTS）語音，作為 NVDA 的合成器。"""
changelog = """版本 0.5.5:
- 改善了 CLD2 與 Google TTS 語言代碼別名之間的自動語言設定檔比對，包括菲律賓文/他加祿文、爪哇文、舊版希伯來文代碼、挪威文變體、阿拉伯文，以及簡體中文、正體中文與粵語中文的對應。
- 改用 MSVC（而非 MinGW-w64）重建內建的 CLD2 Windows DLL，讓封裝後的附加元件不再觸發先前 VirusTotal 測試中的防毒軟體誤判。"""
