summary = "Google TTS For NVDA"
description = """透過受支援的 Chromium 瀏覽器執行階段（例如 Google Chrome、Microsoft Edge 或 Brave），在本機使用 Google 的 WASM 文字轉語音（TTS）語音，作為 NVDA 的合成器。"""
changelog = """版本 0.5:
- 新增內建的附加元件更新檢查功能，可選擇於啟動時自動檢查、查看在地化的更新資訊、直接在 NVDA 內下載，並移交給 NVDA 的附加元件安裝程式進行安裝。
- 改善了 Chrome、Edge 及 Brave 執行階段的回退機制，包括在缺少 WebView2 且有其他受支援的執行階段可用時，自動略過 Edge。
- 改善了與 NVDA 的相容性、語言變更處理、語音朗讀穩定性，新增可選的縮短停頓功能，補充簡體中文與俄文在地化，並改善唯讀狀態欄位的無障礙存取。"""
