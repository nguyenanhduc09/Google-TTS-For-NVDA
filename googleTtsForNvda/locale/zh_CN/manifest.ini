summary = "Google TTS For NVDA"
description = """通过受支持的 Chromium 浏览器运行时（如 Google Chrome、Microsoft Edge 或 Brave）在本地使用 Google 的 WASM 语音合成，作为 NVDA 的语音引擎。"""
changelog = """版本 0.5：
- 添加了内置的插件更新检查功能，支持可选的启动检查、本地化的更新信息、NVDA 内直接下载以及转交给 NVDA 插件安装程序。
- 改进了 Chrome、Edge 和 Brave 运行时的回退机制，包括在缺少 WebView2 且有其他受支持运行时可用时跳过 Edge。
- 提高了 NVDA 兼容性、语音可靠性，改进了简体中文和俄语本地化，并优化了可访问的只读状态字段。"""