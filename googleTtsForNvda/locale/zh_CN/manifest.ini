summary = "NVDA 的 Google TTS"
description = """通过受支持的 Chromium 内核浏览器运行时（如 Google Chrome、Microsoft Edge 或 Brave），在本地使用 Google WASM 文本转语音声音，作为 NVDA 的语音合成器。"""
changelog = """0.5 版本：
- 新增内置插件更新检查功能，支持在 NVDA 启动时自动检查、提供已本地化的更新信息、在 NVDA 内直接下载、自动切换至 NVDA 插件安装程序，并支持在同一公开版本号内接收小版本修复更新。
- 改进 Chrome、Edge 与 Brave 之间的浏览器运行时备用切换机制，包括在缺少 WebView2 但仍有其他可用运行时时自动跳过 Edge，并减少浏览器启动期间的无声或连接错误现象。
- 提高 NVDA 兼容性，优化语言切换处理与语音稳定性，新增缩短停顿选项，提供简体中文、繁体中文和俄语的本地化支持，并改进只读状态框的无障碍访问体验。"""