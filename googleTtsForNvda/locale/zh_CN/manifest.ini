summary = "Google TTS for NVDA"
description = """使用 Google 本地 WASM 文本转语音引擎，通过受支持的 Chromium 内核浏览器运行时（如 Google Chrome、Microsoft Edge 或 Brave）为 NVDA 提供语音合成支持。"""
changelog = """版本 0.4：
- 新增 Google TTS for NVDA 自动语言配置文件，可为每种语言分别保存语音、语音名称、语速、音高、音量、大写字母和拼写设置。
- 改进与 NVDA 2024.1 至 2026 版本的兼容性，并采用更安全的语音合成器。
- 改进多语言长文本朗读，对包含大量 Unicode 标点符号及较少使用空格的文字系统提供更好的支持。
- 新增 Brave 作为受支持的 Chromium 浏览器运行时，并优化 Chrome、Edge 与 Brave 之间的自动切换机制。
- 完善 Edge WebView2 错误处理，并在 GitHub README 中添加 Chrome、Edge 和 Brave 自定义路径的配置说明。
- 新增可自定义手势以打开 Google TTS for NVDA 设置，并优化启用自动语言配置文件后语音参数设置环中的提示；在此模式下，语音参数由语言配置文件统一管理，以兼容 NVDA 的语音设置。
- 改进语音和语音名称的选择、语音预热、语音管理器的稳定性以及朗读中断功能。"""
