summary = "Google TTS Cho NVDA"
description = """Sử dụng cục bộ các giọng chuyển văn bản thành giọng nói WASM của Google thông qua runtime trình duyệt nhân Chromium được hỗ trợ như Google Chrome, Microsoft Edge hoặc Brave làm bộ đọc cho NVDA."""
changelog = """Phiên bản 0.4:
- Thêm hồ sơ ngôn ngữ tự động cấu hình từ Google TTS Cho NVDA, với giọng, tên giọng, tốc độ, cao độ, âm lượng, chữ hoa và đánh vần riêng cho từng ngôn ngữ.
- Cải thiện tương thích với NVDA 2024.1 đến 2026 và đổi bộ đọc an toàn hơn.
- Cải thiện đọc văn bản dài đa ngôn ngữ với nhiều dấu câu Unicode và hệ chữ ít dùng khoảng trắng hơn.
- Thêm Brave làm runtime trình duyệt nhân Chromium được hỗ trợ và cải thiện dự phòng giữa Chrome, Edge và Brave.
- Làm rõ xử lý lỗi Edge WebView2 và ghi hướng dẫn đặt đường dẫn tùy chỉnh cho Chrome, Edge và Brave trong README trên GitHub.
- Thêm cử chỉ có thể tự gán để mở cấu hình Google TTS Cho NVDA và cải thiện thông báo trong vòng thiết lập tham số cho giọng đọc khi bật hồ sơ ngôn ngữ tự động; trong chế độ này, tham số giọng đọc được quản lý bằng hồ sơ để tương thích với cấu hình giọng đọc của NVDA.
- Cải thiện chọn Giọng và Tên giọng, làm ấm giọng, độ an toàn của Trình quản lý giọng và ngắt đọc."""
