summary = "Google TTS Cho NVDA"
description = """Sử dụng cục bộ các giọng chuyển văn bản thành giọng nói WASM của Google thông qua runtime trình duyệt nhân Chromium được hỗ trợ như Google Chrome, Microsoft Edge hoặc Brave làm bộ đọc cho NVDA."""
changelog = """Phiên bản 0.5.5:
- Cải thiện khớp hồ sơ ngôn ngữ tự động cho các bí danh mã ngôn ngữ giữa CLD2 và Google TTS, bao gồm tiếng Philippines/Tagalog, tiếng Java, các mã tiếng Do Thái cũ, các biến thể tiếng Na Uy, tiếng Ả Rập và các ánh xạ tiếng Trung giản thể, tiếng Trung phồn thể và tiếng Quảng Đông.
- Xây dựng lại các DLL CLD2 Windows đi kèm bằng MSVC thay cho MinGW-w64 để gói add-on đã đóng gói không còn bị báo nhầm vi-rút như trước trong kiểm tra VirusTotal."""
