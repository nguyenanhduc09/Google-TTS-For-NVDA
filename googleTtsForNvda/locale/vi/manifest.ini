summary = "Google TTS Cho NVDA"
description = """Sử dụng cục bộ các giọng chuyển văn bản thành giọng nói WASM của Google thông qua runtime trình duyệt được hỗ trợ (Microsoft Edge hoặc Google Chrome) làm bộ đọc cho NVDA."""
changelog = """Phiên bản 0.3:
- Thêm tùy chọn chọn runtime trình duyệt (Microsoft Edge hoặc Google Chrome) trực tiếp trong cấu hình NVDA.
- Chuyển thư mục lưu trữ hồ sơ trình duyệt sang AppData\Local nhằm giữ ổn định bộ nhớ đệm và ẩn cửa sổ nền.
- Thêm hộp lọc theo ngôn ngữ và tính năng dọn dẹp gói giọng tồn đọng trong Trình quản lý giọng.
- Khắc phục tình trạng mất chữ ở câu đầu tiên và cải thiện độ trễ tổng thể.
- Tích hợp 180 gói giọng Google TTS và chuẩn hóa mã ngôn ngữ.
- Hoàn thiện hệ thống dịch thuật và bản dịch tiếng Việt."""
