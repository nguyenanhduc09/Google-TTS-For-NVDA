summary = "GoogleTTSForNVDA (Google TTS для NVDA)"
description = """
Дополнение Google TTS For NVDA позволяет использовать голоса синтезатора речи Google в программе экранного доступа NVDA для Windows.
Оно использует технологию WebAssembly (WASM), работающую в фоновой среде выполнения браузера на основе Chromium.
Дополнение поддерживает браузеры Google Chrome, Microsoft Edge и Brave в качестве фоновой среды выполнения.
После загрузки нужных голосовых пакетов дополнение работает полностью автономно.
Оно обеспечивает быстрый отклик речи без необходимости постоянного подключения к интернету.
Дополнение предоставляет множество голосовых пакетов Google TTS для различных языков.
Встроенный Менеджер голосов Google TTS позволяет удобно просматривать и управлять голосовыми пакетами.
Менеджер содержит две вкладки для управления установленными пакетами и загрузки новых.
Поддерживается фильтрация голосовых пакетов по языку для быстрого поиска.
Дополнение позволяет выбрать предпочитаемый браузер на Chromium для фоновой работы.
Доступна функция автоматических языковых профилей для разных языков.
Каждый языковой профиль может иметь собственный голос и параметры речи.
Автоматические языковые профили используют встроенный детектор языка CLD2.
Результаты определения языка принимаются только при достаточной надёжности.
Для работы требуется установленный браузер на Chromium, а также Microsoft Edge WebView2 Runtime при использовании Edge.
Это дополнение все еще находится в стадии разработки.
Все функции дополнения описаны в справочном руководстве.
"""
changelog = """Версия 0.5.5:
- Улучшено сопоставление автоматических языковых профилей между псевдонимами кодов языков CLD2 и Google TTS, включая филиппинский/тагальский, яванский, устаревшие коды иврита, норвежские варианты, арабский, а также упрощенный, традиционный и кантонский китайский.
- Пересобраны встроенные Windows DLL-библиотеки CLD2 с использованием MSVC вместо MinGW-w64, чтобы упакованное дополнение больше не вызывало предыдущее ложноположительное обнаружение антивируса в тестах VirusTotal."""